# Tmux 配置文件
# 位置: ~/.tmux.conf
# 用途: 配合 OpenClaw/CLI Agent 的高效开发环境

# =============================================================================
# 基础设置
# =============================================================================

# 前缀键改为 Ctrl+a（更符合习惯，且不会与 vim 冲突）
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# 鼠标支持（滚动、选择、调整窗格）
set -g mouse on

# 使用 256 色
set -g default-terminal "screen-256color"

# 设置状态栏刷新间隔
set -g status-interval 5

# 历史缓冲区大小
set -g history-limit 10000

# 自动重命名窗口
set -g automatic-rename on

# 窗口索引从 1 开始（更方便按键）
set -g base-index 1
setw -g pane-base-index 1

# 重新编号窗口（关闭窗口后自动重新编号）
set -g renumber-windows on

# =============================================================================
# 键位绑定
# =============================================================================

# 重新加载配置
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# 快速分屏
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# 使用 vim 风格移动
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 调整窗格大小
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# 同步输入（多窗格同时操作）
bind C-s setw synchronize-panes \; display-message "Synchronize panes: #{?pane_synchronized,ON,OFF}"

# 快速切换最近使用的窗口
bind C-a last-window

# 快速创建新窗口
bind c new-window -c "#{pane_current_path}"

# 关闭窗口/窗格不确认
bind & kill-window
bind x kill-pane

# 复制模式使用 vim 风格
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

# =============================================================================
# 状态栏配置
# =============================================================================

# 状态栏位置
set -g status-position bottom

# 状态栏样式
set -g status-style bg=black,fg=white
set -g status-left-length 40
set -g status-right-length 100

# 左侧：会话名 + 窗口号
set -g status-left "#[fg=green]#S #[fg=yellow]#I #[fg=cyan]#P"

# 右侧：时间 + 日期 + 主机名
set -g status-right "#[fg=yellow]%H:%M #[fg=cyan]%Y-%m-%d #[fg=green]#H"

# 窗口状态样式
setw -g window-status-current-style bg=blue,fg=white,bold
setw -g window-status-style bg=black,fg=white

# 窗格边框样式
set -g pane-border-style fg=white
set -g pane-active-border-style fg=blue,bold

# =============================================================================
# 插件管理（可选）
# =============================================================================

# 安装插件管理器 tpm:
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm

# 插件列表
# set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'tmux-plugins/tmux-resurrect'    # 保存/恢复会话
# set -g @plugin 'tmux-plugins/tmux-continuum'    # 自动保存
# set -g @plugin 'tmux-plugins/tmux-yank'         # 系统剪贴板集成

# 初始化插件管理器（保持在文件底部）
# run '~/.tmux/plugins/tpm/tpm'

# =============================================================================
# Agent 专用配置
# =============================================================================

# 快速启动 OpenClaw 的快捷键
bind O new-window -n openclaw 'openclaw'

# 快速创建 Agent 开发布局
bind D source-file ~/.tmux/dev-layout.tmux

# 快速创建三窗格布局（代码 + Agent + 终端）
bind T run-shell '
    tmux split-window -h -c "#{pane_current_path}";
    tmux split-window -v -c "#{pane_current_path}";
    tmux select-pane -t 1;
'

# 显示帮助
bind ? display-message "
C-a | : 垂直分屏
C-a - : 水平分屏
C-a h/j/k/l : 切换窗格
C-a C-s : 同步输入
C-a O : 启动 OpenClaw
C-a D : 开发布局
C-a T : 三窗格布局
C-a r : 重载配置
"
